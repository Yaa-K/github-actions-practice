name: final task

on:
  push:
    branches:
      - main
  pull_request: 
     branches:
      - feature1

jobs:
  build:
    name: job 1
    runs-on: ubuntu-latest

    steps:
      - name: prints progress of build
        run: echo "building in progress"
      - name: checkout code
        uses: actions/checkout@v4

  test:
    name: job 2
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: prints testing for error
        run: echo "testing for error"
      - name: checkout code
        uses: actions/checkout@v4

  deploy:
    name: job 3
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: prints finally deployed
        run: echo "finally deployed"
      - name: checkout code
        uses: actions/checkout@v4
        

        

      
        
          
    

